version: 47
jobs:
- name: GitHub
  steps:
  - type: PushRepository
    name: GitHub
    remoteUrl: https://github.com/RubenArtz/DeluxeVoidWorld.git
    userName: RubenArtz
    passwordSecret: GitHub
    force: false
    condition: SUCCESSFUL
    optional: false
  triggers:
  - type: BranchUpdateTrigger
    userMatch: anyone
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
