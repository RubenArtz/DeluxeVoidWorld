name: 'DeluxeVoidWorld'
main: 'artzstudio.dev.deluxevoid.DeluxeVoidWorld'
version: '${version}'
authors: [ 'Ruben_Artz', 'Artz Studio' ]
load: 'STARTUP'
softdepend: [ 'PlaceholderAPI', 'SlimeWorldManager', 'Multiverse-Core', 'BotSentry', 'UltraRegions' ]
website: 'https://www.spigotmc.org/resources/86993/'
api-version: '1.16'
description: 'Incredible plugin to send your players when they fall into the void!'
folia-supported: true

commands:
  deluxevoidworld:
    description: 'Command where all the main commands of the plugin are executed.'
    aliases: [ 'dew', 'deluxevoid' ]
  empty:
    description: 'Command to open the player''s inventory'
    aliases: [ 'void' ]


